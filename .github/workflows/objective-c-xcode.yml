name: Xcode Build & Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    name: Build and Archive
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable' # Or specify a version like '15.0'

      - name: Install Dependencies (if using CocoaPods)
        run: |
          if [ -f "Podfile" ]; then
            sudo gem install cocoapods
            pod install
          fi

      - name: Install Dependencies (if using Swift Package Manager)
        run: |
          if [ -f "Package.swift" ]; then
            echo "SPM dependencies resolved automatically during build"
          fi

      - name: Build and Archive
        env:
          SCHEME: ${{ secrets.XCODE_SCHEME }} # e.g., "MyApp"
          CONFIGURATION: "Release"
          EXPORT_METHOD: "app-store" # Options: app-store, ad-hoc, enterprise, development
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: |
          # 1. Clean Derived Data
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

          # 2. Archive the project
          xcodebuild archive \
            -workspace "${{ secrets.XCODE_WORKSPACE }}" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -archivePath "./build/$SCHEME.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          # 3. Export IPA (or .app for macOS)
          # Create an exportOptions.plist dynamically
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>${EXPORT_METHOD}</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "./build/$SCHEME.xcarchive" \
            -exportPath "./build/output" \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ secrets
